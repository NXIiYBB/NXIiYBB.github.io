<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Material System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        Material Control System
    </header>

    <section class="controls">
        <input id="search" placeholder="ค้นหาอุปกรณ์..." oninput="load()">
        <button class="add" onclick="addItem()">+ เพิ่ม</button>
        <button class="logs" onclick="showLogs()">ประวัติ</button>
    </section>

    <section id="summary" class="summary"></section>
    <section id="list" class="grid"></section>
    <section id="logs" class="logsPanel"></section>


    <!-- POPUP MODAL -->
    <div id="modal" class="modal">
        <div class="modal-card">

            <h3>ยืมอุปกรณ์</h3>

            <input id="borrowName" placeholder="ชื่อเล่น">
            <input id="borrowDept" placeholder="ฝ่าย">

            <div class="modal-buttons">
                <button onclick="confirmBorrow()">ยืนยัน</button>
                <button class="cancel" onclick="closeModal()">ยกเลิก</button>
            </div>

        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-card">
            <h3>เพิ่มอุปกรณ์</h3>
            <input id="newItemName" placeholder="ชื่ออุปกรณ์">
            <div class="modal-buttons">
                <button class="add" onclick="openAdd()">+ เพิ่ม</button>
                <button class="cancel" onclick="closeAdd()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
